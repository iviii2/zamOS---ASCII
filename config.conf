# ============================
#   zamOS Neofetch Config
# ============================

print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory

    info cols
}

# ============================
#   ASCII personalizado
# ============================

image_backend="ascii"
ascii_distro="zamos"
ascii_file="/usr/share/neofetch/zamos.txt"

# Colores opcionales (puedes cambiarlos)
ascii_colors=(2 3 4 5 6 1)

# ============================
#   Ajustes generales
# ============================

bold="on"
underline_enabled="on"
separator=":"
stdout="off"
